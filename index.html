<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPLOAD</title>
    <!-- Menggunakan Tailwind CSS via CDN untuk desain yang responsif dan simpel -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .file-drop-area.dragover {
            background-color: rgba(59, 130, 246, 0.05); /* auto map to blue-500/5 */
            border-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4 font-sans text-slate-50 relative overflow-hidden" style="background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%), radial-gradient(at 0% 100%, hsla(225,39%,30%,1) 0, transparent 50%);">

    <div class="bg-white/5 backdrop-blur-xl p-6 sm:p-8 rounded-[20px] shadow-2xl max-w-md w-full border border-white/10 relative z-10">
        <h2 class="text-[24px] font-bold text-white mb-2 flex items-center justify-center gap-3">
            <svg fill="none" height="32" viewBox="0 0 24 24" width="32" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z" fill="#3b82f6"/></svg>
            UPLOAD
        </h2>
        <p class="text-sm text-slate-400 mb-6 text-center">Portal unggah dokumen soal (Format: PDF atau DOCX)</p>

        <!-- Area Upload -->
        <div class="mb-6">
            <div class="file-drop-area relative rounded-[16px] p-8 text-center cursor-pointer bg-transparent border-2 border-dashed border-white/20 hover:border-blue-500 hover:bg-blue-500/5 transition-colors duration-300 flex flex-col items-center justify-center min-h-[240px]" id="dropArea">
                <input 
                    type="file" 
                    id="fileInput" 
                    accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" 
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                >
                <div class="pointer-events-none">
                    <svg class="mx-auto h-12 w-12 text-white/50 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                    </svg>
                    <p class="text-sm font-medium text-slate-300">Klik atau seret file ke sini</p>
                    <p class="text-xs text-white/60 mt-2 opacity-60">PDF atau DOCX</p>
                </div>
            </div>

            <!-- Informasi File yang Terpilih -->
            <div id="fileInfo" class="hidden mt-4 p-3 bg-black/20 border border-white/10 rounded-[8px] flex items-center justify-between">
                <div class="flex items-center overflow-hidden">
                    <svg class="w-5 h-5 text-blue-400 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z" clip-rule="evenodd"></path>
                    </svg>
                    <span id="fileName" class="text-[14px] text-slate-200 font-medium truncate">nama_file.pdf</span>
                </div>
                <button id="removeBtn" class="text-slate-400 hover:text-red-400 flex-shrink-0 ml-2 focus:outline-none" title="Hapus file">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>

        <button id="uploadBtn" disabled class="w-full bg-blue-500 hover:bg-blue-600 disabled:bg-slate-600 disabled:text-slate-300 disabled:cursor-not-allowed text-white font-semibold py-[14px] px-4 rounded-[12px] transition duration-200 focus:outline-none flex items-center justify-center text-[16px]">
            <span id="uploadText">Upload Dokumen</span>
        </button>

        <div id="status" class="mt-4 text-center text-sm font-medium h-6 flex justify-center items-center">
            <!-- Indikator status akan muncul di sini -->
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const fileNameDisplay = document.getElementById('fileName');
        const fileInfo = document.getElementById('fileInfo');
        const removeBtn = document.getElementById('removeBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadText = document.getElementById('uploadText');
        const statusDiv = document.getElementById('status');
        
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzfrg5ML3EmauPu8UUcNwyCrpPGviDtTdoErZ2awG-GzLC50S13WHZOqwLOP3ht-6cq/exec';
        let selectedFile = null;

        // --- Drag and Drop Logic ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, () => dropArea.classList.remove('dragover'), false);
        });

        dropArea.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            if(dt.files.length) {
                fileInput.files = dt.files;
                handleFileSelect();
            }
        }, false);

        // --- Event Listeners ---
        fileInput.addEventListener('change', handleFileSelect);
        removeBtn.addEventListener('click', resetSelection);
        
        function isAllowedExtension(fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            return ['pdf', 'docx'].includes(ext);
        }

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                if (!isAllowedExtension(file.name)) {
                    showStatus('❌ Hanya file .pdf dan .docx yang diperbolehkan.', 'text-red-400');
                    resetSelection();
                    return;
                }
                selectedFile = file;
                fileNameDisplay.textContent = file.name;
                fileInfo.classList.remove('hidden');
                dropArea.classList.add('hidden');
                statusDiv.innerHTML = '';
                uploadBtn.disabled = false;
            }
        }

        function resetSelection() {
            fileInput.value = '';
            selectedFile = null;
            fileInfo.classList.add('hidden');
            dropArea.classList.remove('hidden');
            uploadBtn.disabled = true;
            statusDiv.innerHTML = '';
        }

        function showStatus(htmlContent, colorClass = '') {
            statusDiv.innerHTML = `<span class="${colorClass}">${htmlContent}</span>`;
        }

        function convertToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]); // Ambil konten Base64 saja
                reader.onerror = error => reject(error);
            });
        }

        // --- Upload Logic ---
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // Update UI State
            uploadBtn.disabled = true;
            const originalBtnText = uploadText.innerText;
            uploadBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Mengunggah...</span>
            `;
            statusDiv.innerHTML = '';

            try {
                const base64Data = await convertToBase64(selectedFile);
                
                const payload = {
                    name: selectedFile.name,
                    mimeType: selectedFile.type || 'application/octet-stream',
                    base64: base64Data
                };

                // Menggunakan text/plain untuk bypass preflight CORS pada Google Apps Script
                await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(payload),
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' 
                    }
                });

                showStatus('✅ Berhasil diunggah!', 'text-green-400');
                setTimeout(resetSelection, 2000); // Reset UI setelah berhasil (opsional)
            } catch (error) {
                console.error('Upload Error:', error);
                showStatus('❌ Gagal mengunggah file', 'text-red-400');
            } finally {
                // Restore UI State if failed, or keep it disabled if success until reset
                uploadBtn.innerHTML = `<span id="uploadText">${originalBtnText}</span>`;
                uploadBtn.disabled = !selectedFile;
            }
        });
    </script>
</body>
</html>
